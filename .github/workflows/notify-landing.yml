# This file should be placed in the bereg-content repo at:
# .github/workflows/notify-landing.yml
#
# It triggers a landing rebuild when content is pushed.
# Requires LANDING_DISPATCH_TOKEN secret (GitHub PAT with repo scope for beregowoy/bereg).

name: Notify Landing

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.LANDING_DISPATCH_TOKEN }}
          repository: beregowoy/bereg
          event-type: content-updated
